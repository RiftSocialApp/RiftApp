name: Frontend CI

on:
  push:
    branches: [main]
    paths: [frontend/**]
  pull_request:
    branches: [main]
    paths: [frontend/**]
  workflow_dispatch:

jobs:
  build-and-deploy:
    # Manual runs only build on main (dispatch from other branches is a no-op).
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: rm -rf node_modules package-lock.json && npm install

      - run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_WS_URL: ${{ vars.VITE_WS_URL }}

      # Wrangler runs with workingDirectory: frontend — deploy path must be `dist`, not `frontend/dist`.
      - name: Verify build output for Pages deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: frontend
        run: |
          test -d dist || { echo "::error::frontend/dist is missing after build"; exit 1; }
          test -n "${{ vars.CF_PAGES_PROJECT }}" || { echo "::error::Set GitHub variable CF_PAGES_PROJECT (Pages project name) on the Production environment or repository"; exit 1; }

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          packageManager: npm
          command: pages deploy dist --project-name="${{ vars.CF_PAGES_PROJECT }}"

      - name: Discord notification (success)
        if: success() && github.event_name == 'push'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ack_no_webhook: true
          title: "Frontend Deploy"
          description: "Deployed successfully"
          color: 0x57ab5a
          username: "RiftApp CI"

      - name: Discord notification (failure)
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ack_no_webhook: true
          title: "Frontend Build Failed"
          description: "Build or deploy failed — check logs"
          color: 0xe5534b
          username: "RiftApp CI"
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
