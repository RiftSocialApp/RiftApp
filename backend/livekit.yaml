port: 7880
rtc:
  port_range_start: 50000
  port_range_end: 50200
  tcp_port: 7881
  use_external_ip: true
  # Advertise LAN IP so clients on the same network can connect.
  # Change this to the actual LAN IP of the Proxmox/LXC host.
  ips:
    - 192.168.2.145

# Built-in TURN server for clients behind restrictive NATs
turn:
  enabled: true
  domain: livekit.riftapp.io
  tls_port: 5349
  udp_port: 3478

keys:
  devkey: devsecret
