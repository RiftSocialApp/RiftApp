services:
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    network_mode: host
    command: --config /etc/livekit.yaml --bind 0.0.0.0
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    configs:
      - source: livekit_config
        target: /etc/livekit.yaml

  backend:
    image: ghcr.io/skila1/riftapp/backend:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

configs:
  livekit_config:
    content: |
      port: 7880

      rtc:
        port_range_start: 50000
        port_range_end: 60000
        tcp_port: 7881
        use_external_ip: true
        stun_servers:
          - stun.l.google.com:19302
        pli_throttle:
          low_quality: 500ms
          mid_quality: 500ms
          high_quality: 500ms

      room:
        empty_timeout: 300
        max_participants: 100

      audio:
        active_level: 30
        min_percentile: 1
        update_interval: 400
        smooth_intervals: 2